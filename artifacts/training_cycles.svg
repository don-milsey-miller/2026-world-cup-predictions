  <text x="965" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#374151">hist gradient</text>
  <text x="965" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#374151">boosting</text>

  <rect x="1041" y="283" width="72" height="122" fill="#8aa1b4"/>
