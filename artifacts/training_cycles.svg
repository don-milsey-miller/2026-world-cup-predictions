<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">World Cup Predictor Training Status</title>
  <desc id="desc">Chart showing one logged training cycle and current model candidate validation log loss comparison.</desc>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">World Cup Predictor Training Status</text>

  <text x="300" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2933">Training Cycle Progress</text>
  <line x1="90" y1="405" x2="530" y2="405" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="90" y1="110" x2="90" y2="405" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="90" y1="169" x2="530" y2="169" stroke="#d6dce2" stroke-width="1"/>
  <line x1="90" y1="228" x2="530" y2="228" stroke="#d6dce2" stroke-width="1"/>
  <line x1="90" y1="287" x2="530" y2="287" stroke="#d6dce2" stroke-width="1"/>
  <line x1="90" y1="346" x2="530" y2="346" stroke="#d6dce2" stroke-width="1"/>
  <text x="52" y="174" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.900</text>
  <text x="52" y="233" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.895</text>
  <text x="52" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.890</text>
  <text x="52" y="351" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.885</text>
  <text x="310" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Logged training cycle</text>
  <text x="22" y="258" text-anchor="middle" transform="rotate(-90 22 258)" font-family="Arial, sans-serif" font-size="13" fill="#374151">Validation log loss, lower is better</text>
  <circle cx="310" cy="354" r="6" fill="#2563eb"/>
  <line x1="310" y1="354" x2="310" y2="405" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="310" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2933">autoresearch-inspired</text>
  <text x="310" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2933">0.884289</text>
  <text x="310" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#52616f">1</text>
  <rect x="120" y="474" width="380" height="28" rx="4" fill="#eef2f6"/>
  <text x="310" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">Only one logged cycle exists, so no improvement trend can be inferred yet.</text>

  <text x="900" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2933">Current Candidate Comparison</text>
  <line x1="670" y1="405" x2="1130" y2="405" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="670" y1="110" x2="670" y2="405" stroke="#4b5563" stroke-width="1.5"/>
