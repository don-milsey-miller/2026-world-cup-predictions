  <text x="642" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.905</text>
  <text x="642" y="224" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.900</text>
  <text x="642" y="284" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.895</text>
  <text x="642" y="344" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#52616f">0.890</text>
